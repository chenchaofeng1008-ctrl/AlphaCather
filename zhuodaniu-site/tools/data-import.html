<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>数据导入 - AlphaCather</title>
    <link rel="stylesheet" href="../assets/styles.css">
  </head>
  <body>
    <header class="site-header">
      <nav class="nav" aria-label="主导航">
        <a class="brand" href="../index.html">捉大牛AlphaCather</a>
        <div class="nav-links">
          <a class="nav-link" data-nav="articles" href="../articles/index.html">文章</a>
          <a class="nav-link" data-nav="videos" href="../videos/index.html">视频</a>
          <a class="nav-link" data-nav="tools" href="./index.html">工具</a>
        </div>
      </nav>
    </header>

    <main class="container">
      <section class="hero">
        <p class="eyebrow">Admin</p>
        <h1>投资数据导入</h1>
        <p class="lead">上传资产快照、交易记录、入金出金记录，重算公开收益率曲线。</p>
      </section>

      <section class="section import-layout">
        <article class="form-panel">
          <div class="field">
            <label for="admin-token">后台密码</label>
            <div class="input-row">
              <input id="admin-token" type="password" autocomplete="current-password" placeholder="Cloudflare Worker Secret">
            </div>
          </div>

          <div class="field">
            <label for="import-kind">数据类型</label>
            <div class="input-row">
              <select id="import-kind">
                <option value="asset_snapshots">资产快照</option>
                <option value="trades">交易记录</option>
                <option value="cash_flows">入金出金</option>
              </select>
            </div>
          </div>

          <div class="field">
            <label for="csv-file">PDF 结单文件</label>
            <div class="input-row">
              <input id="csv-file" type="file" accept=".pdf,application/pdf">
            </div>
          </div>

          <div class="field">
            <label for="pdf-password">PDF 密码</label>
            <div class="input-row">
              <input id="pdf-password" type="password" autocomplete="off" placeholder="如果结单没有密码，可以留空">
            </div>
          </div>

          <button class="button secondary-button top-secondary-button" id="extract-pdf-button" type="button">读取 PDF 资产快照</button>

          <div class="field">
            <label for="csv-text">识别结果</label>
            <textarea id="csv-text" class="csv-textarea" spellcheck="false"></textarea>
          </div>

          <button class="button" id="import-button" type="button">导入数据</button>
          <button class="button secondary-button" id="recalculate-button" type="button">重算收益率曲线</button>
          <div class="import-status" id="import-status" role="status"></div>
        </article>

        <aside class="dashboard-card import-template-card">
          <h2>PDF 识别说明</h2>
          <p class="dashboard-note">第一版重点识别资产快照。如果没有识别出来，可以直接在左侧文本框里手动修改。</p>
          <div class="template-block">
            <h3>资产快照</h3>
            <code>date,total_asset,base_currency,cash,market_value</code>
          </div>
          <div class="template-block">
            <h3>交易记录</h3>
            <code>date,symbol,side,quantity,price,currency,fee</code>
          </div>
          <div class="template-block">
            <h3>入金出金</h3>
            <code>date,type,amount,currency,description</code>
          </div>
        </aside>
      </section>
    </main>

    <footer class="site-footer">
      <div class="container">本站内容与工具仅用于学习和估算，不构成投资建议。</div>
    </footer>
    <script src="../assets/common.js"></script>
    <script type="module" src="./data-import.js"></script>
    <script>setActiveNav("tools")</script>
  </body>
</html>
